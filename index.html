<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataVista Dashboard</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
:root{--bg-color:#f8f9fc;--card-bg:#ffffff;--primary-color:#4e73df;--text-main:#3a3b45;--text-dim:#858796;--border-color:#e3e6f0;--success-color:#1cc88a;--dy-red:#fe2c55;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background-color:var(--bg-color);color:var(--text-main);}
.container{max-width:1200px;margin:0 auto;padding:2rem;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
h1{font-size:1.5rem;font-weight:700;color:#5a5c69;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-bottom:2rem;}
.stat-card{background:var(--card-bg);border-radius:0.75rem;padding:1.25rem;box-shadow:0 0.15rem 1.75rem 0 rgba(58,59,69,0.1);border-left:0.25rem solid var(--primary-color);display:flex;flex-direction:column;justify-content:center;}
.stat-label{font-size:0.7rem;font-weight:700;color:var(--primary-color);text-transform:uppercase;margin-bottom:0.25rem;}
.stat-value{font-size:1.25rem;font-weight:700;color:var(--text-main);}
.stat-sub{font-size:0.75rem;color:var(--text-dim);margin-top:0.5rem;}
.card{background:var(--card-bg);border-radius:0.75rem;box-shadow:0 0.15rem 1.75rem 0 rgba(58,59,69,0.1);margin-bottom:2rem;overflow:hidden;}
.card-header{padding:0.75rem 1.25rem;background-color:#f8f9fc;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;}
.card-header h6{font-weight:700;color:var(--primary-color);margin:0;}
.card-body{padding:1.25rem;}
.filter-bar{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem;}
.date-input{padding:0.375rem 0.75rem;border:1px solid #d1d3e2;border-radius:0.35rem;color:#6e707e;font-size:0.9rem;}
.btn{display:inline-block;font-weight:400;text-align:center;cursor:pointer;padding:0.375rem 0.75rem;font-size:0.9rem;border-radius:0.35rem;transition:all 0.15s;border:1px solid transparent;}
.btn-primary{background-color:var(--primary-color);color:white;}
.btn-primary:hover{background-color:#2e59d9;}
.table-responsive{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:0.75rem;font-size:0.85rem;font-weight:700;color:var(--text-main);border-bottom:2px solid var(--border-color);cursor:pointer;}
th:hover{background:#eaecf4;}
td{padding:0.75rem;font-size:0.85rem;color:#6e707e;border-bottom:1px solid var(--border-color);}
tr:hover td{background-color:#f8f9fc;}
.title-cell{max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:var(--text-main);}
.update{text-align:center;color:var(--text-dim);font-size:0.8rem;margin-top:2rem;padding-bottom:1rem;}
</style>
</head>

let filteredData=[...allData];
const tb=document.getElementById("tb").getElementsByTagName("tbody")[0];

function render(d){
tb.innerHTML=d.map(r=>`<tr><td>${r.publish_date}</td><td class="title-cell" title="${r.title.replace(/"/g,"&quot;")}">${r.title}</td><td>${r.play_count.toLocaleString()}</td><td>${r.like_count.toLocaleString()}</td><td>${r.share_count.toLocaleString()}</td><td>${r.collect_count.toLocaleString()}</td><td>${r.follower_gain.toLocaleString()}</td><td>${(r.completion_rate_5s*100).toFixed(1)}%</td><td>${(r.completion_rate*100).toFixed(1)}%</td></tr>`).join("");
updateStats(d);
}

function updateStats(d){
let tp=0,tl=0,tf=0,ts=0,tc=0;
d.forEach(r=>{tp+=r.play_count||0;tl+=r.like_count||0;tf+=r.follower_gain||0;ts+=r.share_count||0;tc+=r.collect_count||0;});
document.getElementById("stat-play").innerText=tp.toLocaleString();
document.getElementById("stat-like").innerText=tl.toLocaleString();
document.getElementById("stat-videos").innerText=d.length.toLocaleString();
document.getElementById("stat-follow").innerText=tf.toLocaleString();
document.getElementById("stat-share").innerText=ts.toLocaleString();
document.getElementById("stat-collect").innerText=tc.toLocaleString();
}

function applyFilter(){
const start=document.getElementById("start-date").value;
const end=document.getElementById("end-date").value;
if(!start||!end){alert("请选择起始和结束日期");return;}
filteredData=allData.filter(r=>r.publish_date>=start&&r.publish_date<=end);
render(filteredData);
}

function resetFilter(){
document.getElementById("start-date").value="";
document.getElementById("end-date").value="";
filteredData=[...allData];
render(filteredData);
}

render(allData);

function sortTable(n){
const keys=['publish_date','title','play_count','like_count','share_count','collect_count','follower_gain','completion_rate_5s','completion_rate'];
const key=keys[n];const dir=document.getElementById("tb").getAttribute("data-dir")==="asc"?"desc":"asc";
document.getElementById("tb").setAttribute("data-dir",dir);
filteredData.sort((a,b)=>{let vA=a[key],vB=b[key];if(typeof vA==='string')return dir==='asc'?vA.localeCompare(vB):vB.localeCompare(vA);return dir==='asc'?vA-vB:vB-vA;});
render(filteredData);
}
