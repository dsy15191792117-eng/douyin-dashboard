let sortKey = 'publish_time';
let sortDesc = true;

function sortData() {
  return [...rawData].sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return sortDesc ? 1 : -1;
    if (av > bv) return sortDesc ? -1 : 1;
    return 0;
  });
}

function renderTable() {
  const sorted = sortData();
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = sorted.map(r => {
    const title = r.title || '';
    const shortTitle = title.length > 25 ? title.slice(0,25) + '...' : title;
    const cr5 = (r.completion_rate_5s * 100).toFixed(1) + '%';
    const cr = (r.completion_rate * 100).toFixed(1) + '%';
    return `<tr>
      <td>${r.publish_date || ''}</td>
      <td class="title-cell" title="${title.replace(/"/g,'&quot;')}">${shortTitle}</td>
      <td>${(r.play_count||0).toLocaleString()}</td>
      <td>${(r.like_count||0).toLocaleString()}</td>
      <td>${(r.comment_count||0).toLocaleString()}</td>
      <td>${(r.share_count||0).toLocaleString()}</td>
      <td>${(r.collect_count||0).toLocaleString()}</td>
      <td>${(r.follower_gain||0).toLocaleString()}</td>
      <td>${cr5}</td>
      <td>${cr}</td>
    </tr>`;
  }).join('');
}

function updateSortIcons() {
  document.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
  const map = {'publish_time':0,'title':1,'play_count':2,'like_count':3,'comment_count':4,'share_count':5,'collect_count':6,'follower_gain':7,'completion_rate_5s':8,'completion_rate':9};
  const idx = map[sortKey];
  if (idx !== undefined) document.querySelectorAll('th')[idx].classList.add(sortDesc ? 'sort-desc' : 'sort-asc');
}

function sortTable(key) {
  if (sortKey === key) sortDesc = !sortDesc;
  else { sortKey = key; sortDesc = (key !== 'title'); }
  renderTable();
  updateSortIcons();
}

renderTable();
updateSortIcons();
